name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ["5.6", "8.2", "8.4", "8.5"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to DHI
        if: matrix.php_version != '5.6'
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: davidzapata/php-composer
          tags: |
            type=raw,value=${{ matrix.php_version }}
            type=raw,value=latest,enable=${{ matrix.php_version == '8.5' }}

      - name: Build and Load for Testing
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.php_version }}
          load: true
          tags: davidzapata/php-composer:test-${{ matrix.php_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test PHP and Composer
        run: |
          docker run --rm --entrypoint php davidzapata/php-composer:test-${{ matrix.php_version }} -v
          docker run --rm --entrypoint composer davidzapata/php-composer:test-${{ matrix.php_version }} --version

      - name: Docker Scout Quickview
        uses: docker/scout-action@v1
        continue-on-error: true
        with:
          command: quickview
          image: davidzapata/php-composer:test-${{ matrix.php_version }}

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: davidzapata/php-composer:test-${{ matrix.php_version }}
          only-fixed: true
          exit-code: true

      - name: Build and Push Multi-platform
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.php_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
